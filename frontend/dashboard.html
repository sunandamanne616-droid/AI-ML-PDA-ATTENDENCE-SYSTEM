<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIML Attendance System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#0c0e14;
  --bg-primary:#111319;
  --bg-card:#181a23;
  --bg-card-hover:#1e2130;
  --bg-elevated:#222536;
  --border:#262a3a;
  --border-light:#2f3449;
  --text-primary:#eef0f6;
  --text-secondary:#8b90a5;
  --text-muted:#5c6178;
  --accent:#06d6a0;
  --accent-dim:#06d6a020;
  --accent-glow:#06d6a040;
  --blue:#4ea8de;
  --blue-dim:#4ea8de18;
  --red:#ff6b6b;
  --red-dim:#ff6b6b18;
  --yellow:#ffd166;
  --yellow-dim:#ffd16618;
  --purple:#b388ff;
  --purple-dim:#b388ff18;
  --font-display:'Plus Jakarta Sans',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --radius:12px;
  --radius-sm:8px;
  --radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,.3);
  --shadow-lg:0 12px 48px rgba(0,0,0,.4);
  --transition:all .25s cubic-bezier(.4,0,.2,1);
}
body{font-family:var(--font-body);background:var(--bg-deep);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* ═══ LOGIN ═══ */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 80% 60% at 20% 80%,#06d6a012 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 20%,#4ea8de10 0%,transparent 60%),var(--bg-deep)}
.login-page::before{content:'';position:absolute;inset:0;opacity:.025;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px}
.login-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 12s ease-in-out infinite}
.login-orb:nth-child(1){width:400px;height:400px;background:#06d6a008;top:-100px;left:-100px}
.login-orb:nth-child(2){width:300px;height:300px;background:#4ea8de08;bottom:-80px;right:-80px;animation-delay:-4s}
.login-orb:nth-child(3){width:200px;height:200px;background:#b388ff06;top:40%;left:60%;animation-delay:-8s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.95)}}
.login-box{position:relative;z-index:1;width:400px;background:rgba(24,26,35,.7);backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px 40px;box-shadow:var(--shadow-lg);animation:fadeUp .5s cubic-bezier(.4,0,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.login-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--blue));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px #06d6a030}
.login-box h1{font-family:var(--font-display);font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box p.login-sub{text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:28px}
.login-label{display:block;font-size:11px;color:var(--text-secondary);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.login-box input{width:100%;padding:11px 14px;margin-bottom:14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-deep);color:var(--text-primary);font-size:14px;font-family:var(--font-body);outline:none;transition:var(--transition)}
.login-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.login-box input::placeholder{color:var(--text-muted)}
.login-box button{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#0bb88a);color:var(--bg-deep);font-family:var(--font-display);font-size:14px;font-weight:700;cursor:pointer;transition:var(--transition);letter-spacing:.3px}
.login-box button:hover{transform:translateY(-1px);box-shadow:0 6px 24px #06d6a030}
.login-error{color:var(--red);text-align:center;margin-top:8px;font-size:12px}

/* ═══ LAYOUT ═══ */
.app{display:none;height:100vh;overflow:hidden}
.sidebar{width:240px;background:var(--bg-primary);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;z-index:100}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-brand-row{display:flex;align-items:center;gap:10px}
.sidebar-brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:0 0 24px #06d6a018}
.sidebar-header h2{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text-primary)}
.sidebar-header small{display:block;font-size:10px;color:var(--text-muted);margin-top:2px}
.sidebar-menu{flex:1;overflow-y:auto;padding:10px}
.sidebar-section{font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:16px 12px 6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary);font-size:13px;font-weight:500;transition:var(--transition);position:relative;margin:1px 0}
.sidebar-item:hover{background:var(--bg-card);color:var(--text-primary)}
.sidebar-item.active{background:var(--accent-dim);color:var(--accent)}
.sidebar-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0}
.sidebar-item .icon{font-size:15px;width:20px;text-align:center}
.sidebar-bottom{padding:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-avatar{width:34px;height:34px;border-radius:8px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--accent);flex-shrink:0}
.sidebar-userinfo{flex:1;min-width:0}
.sidebar-username{font-size:12px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-userrole{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.sidebar-bottom .logout-btn{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-muted);font-size:11px;cursor:pointer;transition:var(--transition);font-family:var(--font-body);white-space:nowrap}
.sidebar-bottom .logout-btn:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:240px;padding:28px 32px;height:100vh;overflow-y:auto}

/* ═══ STAT CARDS ═══ */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:var(--transition);position:relative;overflow:hidden}
.stat-card:hover{border-color:var(--border-light);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 0 0 60px;opacity:.08}
.stat-card.c-teal::after{background:var(--accent)}.stat-card.c-blue::after{background:var(--blue)}.stat-card.c-red::after{background:var(--red)}.stat-card.c-yellow::after{background:var(--yellow)}
.stat-card .label{color:var(--text-muted);font-size:11px;font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--blue)}
.stat-card .value.green{color:var(--accent)}.stat-card .value.red{color:var(--red)}.stat-card .value.yellow{color:var(--yellow)}

/* ═══ PAGES ═══ */
.page{display:none}.page.active{display:block}
.page h2{font-family:var(--font-display);font-size:22px;font-weight:800;margin-bottom:16px;color:var(--text-primary);letter-spacing:-.02em}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px;transition:var(--transition)}
.card:hover{border-color:var(--border-light)}
.card h3{margin-bottom:12px;color:var(--text-primary);font-family:var(--font-display);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-icon{width:28px;height:28px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.card-icon.teal{background:var(--accent-dim);color:var(--accent)}
.card-icon.blue{background:var(--blue-dim);color:var(--blue)}
.card-icon.red{background:var(--red-dim);color:var(--red)}
.card-icon.yellow{background:var(--yellow-dim);color:var(--yellow)}

/* ═══ FORMS ═══ */
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-group{flex:1;min-width:150px}
.form-group label{display:block;color:var(--text-muted);font-size:11px;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:9px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-deep);color:var(--text-primary);font-size:13px;font-family:var(--font-body);outline:none;transition:var(--transition)}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}

/* ═══ BUTTONS ═══ */
.btn{padding:8px 18px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;transition:var(--transition);font-family:var(--font-body);display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--accent-dim);color:var(--accent);border:1px solid transparent}.btn-primary:hover{border-color:var(--accent)}
.btn-success{background:var(--accent);color:var(--bg-deep)}.btn-success:hover{box-shadow:0 4px 16px var(--accent-glow)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid transparent}.btn-danger:hover{border-color:var(--red)}
.btn-warning{background:var(--yellow-dim);color:var(--yellow);border:1px solid transparent}.btn-warning:hover{border-color:var(--yellow)}
.btn-secondary{background:var(--purple-dim);color:var(--purple);border:1px solid transparent}.btn-secondary:hover{border-color:var(--purple)}
.btn-sm{padding:5px 12px;font-size:11px}

/* ═══ TABLES ═══ */
table{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px}
th{background:var(--bg-elevated);color:var(--text-muted);padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;border-bottom:1px solid var(--border)}
th:first-child{border-radius:var(--radius-sm) 0 0 0}th:last-child{border-radius:0 var(--radius-sm) 0 0}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-secondary);transition:var(--transition)}
tr:hover td{background:var(--bg-card-hover);color:var(--text-primary)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.badge-p{background:var(--accent-dim);color:var(--accent)}.badge-a{background:var(--red-dim);color:var(--red)}
.badge-warn{background:var(--yellow-dim);color:var(--yellow)}

/* ═══ CAMERA ═══ */
.camera-container{position:relative;background:#000;border-radius:var(--radius);overflow:hidden;max-width:640px;margin:12px 0;border:1px solid var(--border)}
.camera-container video,.camera-container img,.camera-container canvas{width:100%;display:block;border-radius:var(--radius)}
.camera-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.camera-status{position:absolute;top:10px;right:10px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.camera-status.live{background:var(--accent);color:var(--bg-deep)}.camera-status.off{background:var(--red);color:#fff}
.camera-status.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--bg-deep);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.no-camera{display:flex;align-items:center;justify-content:center;height:300px;background:var(--bg-card);border-radius:var(--radius);color:var(--text-muted);font-size:14px}

/* ═══ PROGRESS ═══ */
.progress-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s}

/* ═══ TOAST ═══ */
.toast{position:fixed;top:20px;right:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;z-index:9999;animation:slideIn .3s;max-width:350px;font-size:13px;box-shadow:var(--shadow)}
.toast.success{border-color:var(--accent);color:var(--accent)}.toast.error{border-color:var(--red);color:var(--red)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ═══ ALERTS ═══ */
.alert-box{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:12px;font-size:13px}
.alert-red{background:var(--red-dim);border:1px solid #ff6b6b40;color:var(--red)}
.alert-green{background:var(--accent-dim);border:1px solid #06d6a040;color:var(--accent)}
.alert-yellow{background:var(--yellow-dim);border:1px solid #ffd16640;color:var(--yellow)}

/* ═══ MODAL ═══ */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:10000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;max-width:700px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-box h2{color:var(--accent);margin-bottom:6px;font-family:var(--font-display);font-size:18px;font-weight:700}
.modal-box .subtitle{color:var(--text-secondary);font-size:12px;margin-bottom:16px}
.capture-video-wrap{position:relative;background:#000;border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.capture-video-wrap video{width:100%;display:block;border-radius:var(--radius)}
.capture-video-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.capture-stats{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.capture-stats .cs{background:var(--bg-deep);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;text-align:center;flex:1;min-width:100px}
.capture-stats .cs .num{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--blue)}
.capture-stats .cs .lbl{font-size:10px;color:var(--text-muted)}
.capture-msg{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:10px;text-align:center;font-weight:600}
</style>
</head>
<body>

<!-- ══════ LOGIN ══════ -->
<div class="login-page" id="loginPage">
  <div class="login-orb"></div><div class="login-orb"></div><div class="login-orb"></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🎓</div>
      <h1>AIML Attendance</h1>
    </div>
    <p class="login-sub">AI-Powered Face Recognition System</p>
    <label class="login-label">Username</label>
    <input type="text" id="loginUser" placeholder="Enter your username">
    <label class="login-label">Password</label>
    <input type="password" id="loginPass" placeholder="Enter your password">
    <button onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══════ APP ══════ -->
<div class="app" id="appContainer">
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand-row">
      <div class="sidebar-brand-icon">🎓</div>
      <div><h2>AIML Attend</h2><small id="userInfo"></small></div>
    </div>
  </div>
  <div class="sidebar-menu" id="sidebarMenu"></div>
  <div class="sidebar-bottom">
    <div class="sidebar-avatar" id="sidebarAvatar">U</div>
    <div class="sidebar-userinfo">
      <div class="sidebar-username" id="sidebarUsername">User</div>
      <div class="sidebar-userrole" id="sidebarRole">Role</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</div>
<div class="main" id="mainContent"></div>
</div>

<!-- Face Capture Modal -->
<div class="modal-overlay" id="faceCaptureModal">
  <div class="modal-box">
    <h2 id="capModalTitle">📸 Capture Face — <span id="capRollLabel"></span></h2>
    <p class="subtitle" id="capNameLabel"></p>
    <div class="capture-msg alert-yellow" id="capMsg">Position student's face in the camera and press Start</div>
    <div class="capture-video-wrap">
      <video id="capVideo" autoplay muted playsinline></video>
      <canvas id="capCanvas"></canvas>
    </div>
    <div class="capture-stats">
      <div class="cs"><div class="num" id="capCaptured">0</div><div class="lbl">Captured</div></div>
      <div class="cs"><div class="num" id="capTarget">60</div><div class="lbl">Target</div></div>
      <div class="cs"><div class="num" id="capSkipped">0</div><div class="lbl">Skipped</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="capProgress" style="width:0%"></div></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-success" id="capStartBtn" onclick="startFaceCapture()">▶ Start Capture</button>
      <button class="btn btn-danger" id="capStopBtn" onclick="stopFaceCapture()" style="display:none">⏹ Stop</button>
      <button class="btn btn-warning" id="capSkipBtn" onclick="closeFaceCaptureModal()">✖ Skip / Close</button>
    </div>
  </div>
</div>


<script>
const API = '';
let TOKEN = '', ROLE = '', USERNAME = '';

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  err.textContent='';
  try{
    const r=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:`username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'Login failed');
    TOKEN=d.access_token;ROLE=d.role;USERNAME=d.username||u;
    localStorage.setItem('token',TOKEN);localStorage.setItem('role',ROLE);localStorage.setItem('username',USERNAME);
    showApp();
  }catch(e){err.textContent=e.message}
}
function doLogout(){TOKEN='';ROLE='';USERNAME='';localStorage.clear();location.reload()}
function authHeaders(){return{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'}}

window.onload=()=>{
  TOKEN=localStorage.getItem('token')||'';ROLE=localStorage.getItem('role')||'';USERNAME=localStorage.getItem('username')||'';
  if(TOKEN)showApp();
};

function showApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appContainer').style.display='flex';
  document.getElementById('userInfo').textContent=`${USERNAME} (${ROLE})`;
  document.getElementById('sidebarUsername').textContent=USERNAME;
  document.getElementById('sidebarRole').textContent=ROLE;
  document.getElementById('sidebarAvatar').textContent=USERNAME.substring(0,2).toUpperCase();
  buildSidebar();buildPages();
  document.querySelector('.sidebar-item')?.click();
}

function toast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

async function api(url,opts={}){
  const r=await fetch(API+url,{...opts,headers:{...authHeaders(),...(opts.headers||{})}});
  if(r.status===401){doLogout();return null}
  return r;
}
function buildSidebar(){
  const m=document.getElementById('sidebarMenu');
  let items=[];
  if(ROLE==='faculty'){
    items=[
      {s:'Overview'},{icon:'📊',label:'Dashboard',page:'faculty-dash'},
      {s:'Manage'},{icon:'👥',label:'Students',page:'faculty-students'},
      {icon:'📅',label:'Timetable',page:'faculty-timetable'},
      {s:'Attendance'},{icon:'🤖',label:'Start Attendance',page:'faculty-attendance'},
      {icon:'📋',label:'Register',page:'faculty-register'},
      {icon:'📈',label:'Reports & Averages',page:'faculty-reports'},
      {s:'Academic Planner'},{icon:'🗓️',label:'Semester Calendar',page:'faculty-calendar'},
      {icon:'📚',label:'Syllabus',page:'faculty-syllabus'},
      {icon:'📝',label:'Lesson Plan',page:'faculty-lessonplan'},
      {s:'AI'},{icon:'🧠',label:'Face Recognition',page:'faculty-face'},
    ];
  }else if(ROLE==='student'){
    items=[
      {s:'My Attendance'},{icon:'📊',label:'Overview',page:'student-dash'},
      {icon:'📚',label:'Subject Wise',page:'student-subjects'},
      {icon:'📋',label:'Day by Day Records',page:'student-records'},
      {s:'Academic'},{icon:'📚',label:'Syllabus',page:'faculty-syllabus'},

    `<div class="sidebar-item" onclick="showPage('${i.page}',this)"><span class="icon">${i.icon}</span>${i.label}</div>`).join('');
}

function showPage(page,el){
  document.querySelectorAll('.sidebar-item').forEach(e=>e.classList.remove('active'));
  if(el)el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById(page);
  if(pg){pg.classList.add('active');if(pg.dataset.init)window[pg.dataset.init]?.();}
}

// ── Toast ──
function toast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// ── API Helper ──
async function api(url,opts={}){
  const r=await fetch(API+url,{...opts,headers:{...authHeaders(),...(opts.headers||{})}});
  if(r.status===401){doLogout();return null}
  return r;
}

// ── Take Attendance — Like reference track_images() ──────
// Single flow: Take Attendance → camera opens → faces marked in real-time → Stop
let localStream=null, frameRunning=false, markedStudents={};

async function takeAttendance(){
  const sem=parseInt(document.getElementById('fAttSem').value)||8;
  const subj=document.getElementById('fAttSubj').value.trim();
  if(!subj){toast('Enter a subject name!','error');return}

  // Step 1: Start attendance session on server
  try{
    const r=await api('/live/start-attendance',{method:'POST',body:JSON.stringify({
      semester:sem, subject:subj, faculty_name:USERNAME, threshold:0.4
    })});
    if(!r||!r.ok){
      const d=r?await r.json():{detail:'Server error'};
      throw new Error(d.detail||'Failed to start');
    }
    const d=await r.json();
    toast(d.message);
  }catch(e){toast(e.message,'error');return}

  // Step 2: Open webcam
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
    document.getElementById('localVideo').srcObject=localStream;
    document.getElementById('cameraContainer').style.display='block';
    document.getElementById('camStatus').textContent='🔴 SCANNING';
    document.getElementById('camStatus').className='camera-status live';
  }catch(e){toast('Camera error: '+e.message+'. Allow camera permission in browser.','error');return}

  // Step 3: Update UI
  markedStudents={};
  document.getElementById('btnTakeAtt').style.display='none';
  document.getElementById('btnStopAtt').style.display='';
  document.getElementById('attLiveInfo').style.display='block';
  document.getElementById('attendanceResult').style.display='none';
  document.getElementById('attLiveText').textContent=`🤖 Scanning faces for ${subj} (Sem ${sem})... Students marked as they appear`;
  document.getElementById('attMarkedList').innerHTML='<p style="color:var(--text-muted);font-size:13px">Waiting for faces...</p>';
  toast(`Attendance started for ${subj}! Point camera at students.`);

  // Step 4: Start sending frames (sequential — like reference code's while loop)
  frameRunning=true;
  sendFrameLoop();
}

async function sendFrameLoop(){
  const video=document.getElementById('localVideo');
  const canvas=document.createElement('canvas');
  canvas.width=640; canvas.height=480;
  const ctx=canvas.getContext('2d');

  while(frameRunning && localStream){
    try{
      ctx.drawImage(video,0,0,640,480);
      const data=canvas.toDataURL('image/jpeg',0.6);

      const fd=new FormData();
      fd.append('frame',data);
      const r=await fetch(API+'/live/process-frame',{
        method:'POST', headers:{Authorization:'Bearer '+TOKEN}, body:fd
      });

      if(!r.ok){await new Promise(ok=>setTimeout(ok,500));continue}
      const d=await r.json();

      // Draw face boxes on overlay (green=known, red=unknown)
      if(d.faces && d.faces.length>0){
        drawDetections(d.faces);
      }else{
        clearOverlay();
      }

      // Handle newly marked students (real-time marking like reference)
      if(d.newly_marked && d.newly_marked.length>0){
        d.newly_marked.forEach(s=>{
          markedStudents[s.roll_no]={name:s.name,score:s.score,time:new Date().toLocaleTimeString()};
          toast(`✅ Marked: ${s.name} (${s.roll_no})`);
        });
      }

      // Auto-stop after 20 minutes
      if(d.auto_stopped){
        toast('⏱ 20 minutes reached — auto-stopping attendance...','success');
        stopAttendance();
        return;
      }

      // Update recognized count display
      const count=d.recognized_count||Object.keys(markedStudents).length;
      const elapsed=d.elapsed||0;
      const mins=Math.floor(elapsed/60);const secs=elapsed%60;
      document.getElementById('attLiveText').textContent=
        `🤖 Scanning... ${mins}:${String(secs).padStart(2,'0')} elapsed | ✅ ${count} students marked present`;

      // Update marked students list
      updateMarkedList();

      // Small delay between frames
      await new Promise(ok=>setTimeout(ok,200));

    }catch(e){
      console.error('[FRAME]',e);
      await new Promise(ok=>setTimeout(ok,1000));
    }
  }
}

function updateMarkedList(){
  const entries=Object.entries(markedStudents);
  if(entries.length===0){
    document.getElementById('attMarkedList').innerHTML='<p style="color:var(--text-muted);font-size:13px">Waiting for faces...</p>';
    return;
  }
  let html='<table><tr><th>#</th><th>Roll No</th><th>Name</th><th>Score</th><th>Time</th></tr>';
  entries.forEach(([roll,info],i)=>{
    html+=`<tr><td>${i+1}</td><td><b>${roll}</b></td><td>${info.name}</td>
      <td><span class="badge badge-p">${(info.score*100).toFixed(0)}%</span></td>
      <td>${info.time}</td></tr>`;
  });
  html+='</table>';
  document.getElementById('attMarkedList').innerHTML=html;
}

function drawDetections(faces){
  const canvas=document.getElementById('overlayCanvas');
  const video=document.getElementById('localVideo');
  canvas.width=video.videoWidth||640; canvas.height=video.videoHeight||480;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  faces.forEach(f=>{
    const [x1,y1,x2,y2]=f.bbox;
    const color=f.known?'var(--accent)':'var(--red)';
    // Box
    ctx.strokeStyle=color; ctx.lineWidth=3;
    ctx.strokeRect(x1,y1,x2-x1,y2-y1);
    // Label
    const name=f.name||f.roll_no;
    const label=f.known?`${name} (${(f.score*100).toFixed(0)}%)`:'Unknown';
    ctx.font='bold 14px Segoe UI, sans-serif';
    const tw=ctx.measureText(label).width;
    ctx.fillStyle=color;
    ctx.fillRect(x1,y1-24,tw+10,24);
    ctx.fillStyle='#fff';
    ctx.fillText(label,x1+5,y1-7);
  });
}

function clearOverlay(){
  const c=document.getElementById('overlayCanvas');
  if(c){const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height)}
}

async function stopAttendance(){
  // Stop frame loop
  frameRunning=false;

  // Tell server to finalize (mark absent students + update Excel)
  document.getElementById('attLiveText').textContent='⏳ Saving attendance & marking absent students...';
  try{
    const r=await api('/live/stop-attendance',{method:'POST'});
    const d=await r.json();

    // Stop camera
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null}
    document.getElementById('cameraContainer').style.display='none';
    document.getElementById('camStatus').textContent='OFF';
    document.getElementById('camStatus').className='camera-status off';
    clearOverlay();

    // Show result
    document.getElementById('attLiveInfo').style.display='none';
    document.getElementById('attendanceResult').style.display='block';

    let presentHtml='';
    if(d.present && d.present.length>0){
      presentHtml='<table style="margin-top:10px"><tr><th>#</th><th>Roll No</th><th>Name</th><th>Score</th><th>Marked At</th></tr>';
      d.present.forEach((s,i)=>{

async function loadRegisterGrid(){

function renderRegister(){
  if(!registerData){document.getElementById('fRegTable').innerHTML='<p style="color:var(--text-muted)">Load register first</p>';return}
  const d=registerData;
  let students=d.students;
  if(showBelow75Only) students=students.filter(s=>s.below_75);

  if(!d.dates.length){document.getElementById('fRegTable').innerHTML='<p style="color:var(--text-muted)">No attendance records yet</p>';return}

  let html='<table style="font-size:12px"><tr><th>Roll No</th><th>Name</th>';
  d.dates.forEach(dt=>{const short=dt.slice(5);const isH=d.holidays&&d.holidays[dt];if(isH){html+=`<th style="writing-mode:vertical-lr;padding:4px;font-size:10px;background:var(--yellow-dim);color:var(--yellow);cursor:pointer" title="${d.holidays[dt]}" onclick="unmarkHoliday('${dt}')">H</th>`}else{html+=`<th style="writing-mode:vertical-lr;padding:4px;font-size:10px;cursor:pointer" title="Click to delete" onclick="deleteDate('${dt}')">${short}</th>`}});
  html+='<th>Total</th><th>P</th><th>A</th><th>%</th></tr>';

  students.forEach(s=>{
    const rowColor=s.below_75?'style="background:#ff6b6b08"':'';
    html+=`<tr ${rowColor}><td><b>${s.roll_no}</b></td><td>${s.name}</td>`;
    d.dates.forEach(dt=>{
      const isH=d.holidays&&d.holidays[dt];
      if(isH){html+=`<td style="text-align:center;background:var(--yellow-dim);padding:2px"><span style="font-size:10px;color:var(--yellow)">H</span></td>`}
      else{const st=s.attendance[dt]||'-';const cls=st==='P'?'badge-p':st==='A'?'badge-a':'';const click=`onclick="toggleAtt('${s.roll_no}','${dt}','${registerData.subject}')"`;html+=`<td style="text-align:center;cursor:pointer;padding:2px" ${click}><span class="badge ${cls}" style="font-size:10px">${st}</span></td>`}
    });
    html+=`<td>${s.total}</td><td style="color:var(--accent)">${s.present}</td><td style="color:var(--red)">${s.absent}</td>`;
    const pctColor=s.below_75?(s.percentage<60?'var(--red)':'var(--yellow)'):'var(--accent)';
    html+=`<td><b style="color:${s.below_75?'var(--red)':'var(--accent)'}">${s.percentage}%</b> <div style="height:4px;background:var(--border);border-radius:2px;width:50px;display:inline-block;vertical-align:middle;margin-left:4px;overflow:hidden"><div style="height:100%;width:${s.percentage}%;background:${pctColor};border-radius:2px"></div></div></td></tr>`;
  });
  html+='</table>';
  document.getElementById('fRegTable').innerHTML=html;
}

async function toggleAtt(roll,day,subject){
  const current=registerData.students.find(s=>s.roll_no===roll)?.attendance[day];
  const newStatus=current==='P'?'A':'P';
  try{
    const r=await api('/attendance/override',{method:'POST',body:JSON.stringify({roll_no:roll,subject:subject,day:day,status:newStatus})});
    if(!r.ok){const d=await r.json();throw new Error(d.detail||'Failed')}
    toast(`${roll}: ${current} → ${newStatus}`);
    loadRegisterGrid();
  }catch(e){toast(e.message,'error')}
}

function toggleBelow75(){
  showBelow75Only=!showBelow75Only;
  document.getElementById('btnBelow75').textContent=showBelow75Only?'👥 Show All':'⚠️ Show Below 75%';

}

async function editStudent(roll){
  const name=prompt('Enter new name (or leave blank to keep):');
  const email=prompt('Enter email (or leave blank to keep):');
  const phone=prompt('Enter phone (or leave blank to keep):');
  const sem=prompt('Enter semester (or leave blank to keep):');
  if(name===null)return; // cancelled
  try{
    // Get current data first
    const sem_val=document.getElementById('fListSem')?.value||document.getElementById('hListSem')?.value||8;
    const lr=await api(`/students/list?semester=${sem_val}`);const students=await lr.json();
    const st=students.find(s=>s.roll_no===roll);
    if(!st){toast('Student not found','error');return}
    const r=await api(`/students/update/${roll}`,{method:'PUT',body:JSON.stringify({
      roll_no:roll, name:name||st.name, semester:parseInt(sem)||st.semester,
      dept:st.dept||'AIML', email:email||st.email||'', phone:phone||st.phone||''
    })});
    if(!r.ok){const d=await r.json();throw new Error(d.detail)}
    toast('Student updated!');
    try{loadFacultyStudents()}catch(e){}
    try{loadHODStudents()}catch(e){}
  }catch(e){toast(e.message,'error')}
}

// ── Live Monitor — Surveillance Mode ─────────────────────
let survStream=null, survRunning=false;

async function startSurveillance(){
  try{
    survStream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
    document.getElementById('survVideo').srcObject=survStream;
    document.getElementById('survCamContainer').style.display='block';
    document.getElementById('btnStartSurv').style.display='none';
    document.getElementById('btnStopSurv').style.display='';
    survRunning=true;
    survFrameLoop();
  }catch(e){toast('Camera error: '+e.message,'error')}
}

function stopSurveillance(){
  survRunning=false;
  if(survStream){survStream.getTracks().forEach(t=>t.stop());survStream=null}
  document.getElementById('survCamContainer').style.display='none';
  document.getElementById('btnStartSurv').style.display='';
  document.getElementById('btnStopSurv').style.display='none';
  document.getElementById('survDetections').innerHTML='';
  document.getElementById('survInfo').innerHTML='';
  const c=document.getElementById('survOverlay');
  if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);
}

async function survFrameLoop(){
  const video=document.getElementById('survVideo');
  const canvas=document.createElement('canvas');
  canvas.width=640;canvas.height=480;
  const ctx=canvas.getContext('2d');

  while(survRunning&&survStream){
    try{
      ctx.drawImage(video,0,0,640,480);
      const data=canvas.toDataURL('image/jpeg',0.5);
      const fd=new FormData();fd.append('frame',data);
      const r=await fetch(API+'/live/surveillance-frame',{method:'POST',headers:{Authorization:'Bearer '+TOKEN},body:fd});
      if(r.ok){
        const d=await r.json();
        // Draw face boxes
        if(d.faces&&d.faces.length>0){
          drawSurvDetections(d.faces);
          let html=`<p style="color:var(--text-secondary);font-size:13px">👁 ${d.person_count} person(s) detected</p>`;
          d.faces.forEach(f=>{
            html+=`<span class="badge ${f.known?'badge-p':'badge-a'}" style="margin:2px;padding:4px 8px">${f.known?f.name:'Unknown'} (${(f.score*100).toFixed(0)}%)</span> `;
          });
          document.getElementById('survDetections').innerHTML=html;
        }else{
          clearSurvOverlay();
          document.getElementById('survDetections').innerHTML='<p style="color:var(--text-muted);font-size:13px">No faces detected</p>';
        }
        document.getElementById('survInfo').innerHTML=`<div class="alert-box alert-green" style="padding:6px 10px;font-size:12px">🔴 LIVE — ${d.person_count||0} person(s) in frame</div>`;
      }
      await new Promise(ok=>setTimeout(ok,300));
    }catch(e){
      console.error('[SURV]',e);
      await new Promise(ok=>setTimeout(ok,1000));
    }
  }
}

function drawSurvDetections(faces){
  const canvas=document.getElementById('survOverlay');
  const video=document.getElementById('survVideo');
  canvas.width=video.videoWidth||640;canvas.height=video.videoHeight||480;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  faces.forEach(f=>{
    const [x1,y1,x2,y2]=f.bbox;
    const color=f.known?'var(--accent)':'var(--red)';
    ctx.strokeStyle=color;ctx.lineWidth=3;
    ctx.strokeRect(x1,y1,x2-x1,y2-y1);
    const label=f.known?`${f.name} (${(f.score*100).toFixed(0)}%)`:'Unknown';
    ctx.font='bold 14px Segoe UI';
    const tw=ctx.measureText(label).width;
    ctx.fillStyle=color;ctx.fillRect(x1,y1-24,tw+10,24);
    ctx.fillStyle='#fff';ctx.fillText(label,x1+5,y1-7);
  });
}

function clearSurvOverlay(){
  const c=document.getElementById('survOverlay');
  if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function renderHODRegister(){
  if(!hodRegData){document.getElementById('hRegTable').innerHTML='<p style="color:var(--text-muted)">Load register first</p>';return}
  const d=hodRegData;
  let students=d.students;
  if(hodBelow75) students=students.filter(s=>s.below_75);
  if(!d.dates.length){document.getElementById('hRegTable').innerHTML='<p style="color:var(--text-muted)">No records</p>';return}

  let html='<table style="font-size:12px"><tr><th>Roll No</th><th>Name</th>';
  d.dates.forEach(dt=>{const short=dt.slice(5);const isH=d.holidays&&d.holidays[dt];if(isH){html+=`<th style="writing-mode:vertical-lr;padding:4px;font-size:10px;background:var(--yellow-dim);color:var(--yellow);cursor:pointer" title="${d.holidays[dt]}" onclick="unmarkHoliday('${dt}')">H</th>`}else{html+=`<th style="writing-mode:vertical-lr;padding:4px;font-size:10px;cursor:pointer" title="Click to delete" onclick="deleteDate('${dt}')">${short}</th>`}});
  html+='<th>Total</th><th>P</th><th>A</th><th>%</th></tr>';
  students.forEach(s=>{
    const rc=s.below_75?'style="background:#ff6b6b08"':'';
    html+=`<tr ${rc}><td><b>${s.roll_no}</b></td><td>${s.name}</td>`;
    d.dates.forEach(dt=>{
      const isH=d.holidays&&d.holidays[dt];
      if(isH){html+=`<td style="text-align:center;background:var(--yellow-dim);padding:2px"><span style="font-size:10px;color:var(--yellow)">H</span></td>`}
      else{const st=s.attendance[dt]||'-';const cls=st==='P'?'badge-p':st==='A'?'badge-a':'';const click=`onclick="overrideAtt('${s.roll_no}','${dt}','${d.subject}')"`;html+=`<td style="text-align:center;cursor:pointer;padding:2px" ${click}><span class="badge ${cls}" style="font-size:10px">${st}</span></td>`}
    });
    html+=`<td>${s.total}</td><td style="color:var(--accent)">${s.present}</td><td style="color:var(--red)">${s.absent}</td>`;
    const pctColor=s.below_75?(s.percentage<60?'var(--red)':'var(--yellow)'):'var(--accent)';
    html+=`<td><b style="color:${s.below_75?'var(--red)':'var(--accent)'}">${s.percentage}%</b> <div style="height:4px;background:var(--border);border-radius:2px;width:50px;display:inline-block;vertical-align:middle;margin-left:4px;overflow:hidden"><div style="height:100%;width:${s.percentage}%;background:${pctColor};border-radius:2px"></div></div></td></tr>`;
  });
  html+='</table>';
  document.getElementById('hRegTable').innerHTML=html;
}

// FACE CAPTURE MODAL — Webcam capture + auto train
// ══════════════════════════════════════════════════════════
let capStream=null, capRunning=false, capRoll='', capCaptured=0, capSkipped=0;
const CAP_TARGET=60, CAP_INTERVAL_MS=300;

function openFaceCaptureModal(roll,name){
  capRoll=roll; capCaptured=0; capSkipped=0; capRunning=false;
  document.getElementById('capRollLabel').textContent=roll;
  document.getElementById('capNameLabel').textContent=name;
  document.getElementById('capCaptured').textContent='0';
  document.getElementById('capTarget').textContent=CAP_TARGET;
  document.getElementById('capSkipped').textContent='0';
  document.getElementById('capProgress').style.width='0%';
  document.getElementById('capMsg').className='capture-msg alert-yellow';
  document.getElementById('capMsg').textContent='Position student\'s face in the camera and press Start';
  document.getElementById('capStartBtn').style.display='';
  document.getElementById('capStartBtn').disabled=false;
  document.getElementById('capStopBtn').style.display='none';
  document.getElementById('capSkipBtn').textContent='✖ Skip / Close';
  document.getElementById('faceCaptureModal').classList.add('active');
  // Start webcam preview immediately
  startCapPreview();
}

async function startCapPreview(){
  try{
    capStream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
    document.getElementById('capVideo').srcObject=capStream;
  }catch(e){
    document.getElementById('capMsg').className='capture-msg alert-red';
    document.getElementById('capMsg').textContent='Camera access denied. Please allow camera permission.';
  }
}

async function startFaceCapture(){
  if(!capStream){toast('Camera not available','error');return}
  capRunning=true; capCaptured=0; capSkipped=0;
  document.getElementById('capStartBtn').style.display='none';
  document.getElementById('capStopBtn').style.display='';
  document.getElementById('capMsg').className='capture-msg alert-green';
  document.getElementById('capMsg').textContent='Capturing... Look at the camera. Move face slightly for variety.';
  captureFaceLoop();
}

async function captureFaceLoop(){
  if(!capRunning||capCaptured>=CAP_TARGET){
    finishFaceCapture();
    return;
  }
  const video=document.getElementById('capVideo');
  const canvas=document.getElementById('capCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=video.videoWidth||640;
  canvas.height=video.videoHeight||480;
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const dataUrl=canvas.toDataURL('image/jpeg',0.85);

  try{
    const fd=new FormData();
    fd.append('roll_no',capRoll);
    fd.append('frame',dataUrl);
    const r=await fetch(API+'/face/register-frame',{method:'POST',headers:{Authorization:'Bearer '+TOKEN},body:fd});
    const d=await r.json();
    if(d.skipped){
      capSkipped++;
      document.getElementById('capSkipped').textContent=capSkipped;
      // Draw red border on canvas to show no face / multiple faces
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=4;
      ctx.strokeRect(2,2,canvas.width-4,canvas.height-4);
    }else{
      capCaptured++;
      document.getElementById('capCaptured').textContent=capCaptured;
      document.getElementById('capProgress').style.width=((capCaptured/CAP_TARGET)*100)+'%';
      // Draw green border to show successful capture
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle='#06d6a0'; ctx.lineWidth=4;
      ctx.strokeRect(2,2,canvas.width-4,canvas.height-4);
    }
  }catch(e){
    capSkipped++;
    document.getElementById('capSkipped').textContent=capSkipped;
  }
  if(capRunning&&capCaptured<CAP_TARGET){
    setTimeout(captureFaceLoop,CAP_INTERVAL_MS);
  }else{
    finishFaceCapture();
  }
}

function stopFaceCapture(){
  capRunning=false;
}

async function finishFaceCapture(){
  capRunning=false;
  document.getElementById('capStopBtn').style.display='none';
  document.getElementById('capStartBtn').style.display='none';
  if(capCaptured===0){
    document.getElementById('capMsg').className='capture-msg alert-red';
    document.getElementById('capMsg').textContent='No faces captured. You can register face later from Face Recognition page.';
    document.getElementById('capSkipBtn').textContent='✖ Close';
    return;
  }
  // Auto build embeddings
  document.getElementById('capMsg').className='capture-msg alert-yellow';
  document.getElementById('capMsg').textContent=`Captured ${capCaptured} photos! Building AI model... please wait`;
  try{
    const r=await api(`/face/build-single/${capRoll}`,{method:'POST'});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail);
    // Reload the live attendance AI model so it picks up new faces
    try{await api('/live/reload-embeddings',{method:'POST'})}catch(e){console.log('reload-emb:',e)}
    document.getElementById('capMsg').className='capture-msg alert-green';
    document.getElementById('capMsg').textContent=`✅ Done! ${capCaptured} photos captured & model trained. ${d.message}`;
  }catch(e){
    document.getElementById('capMsg').className='capture-msg alert-yellow';
    document.getElementById('capMsg').textContent=`${capCaptured} photos captured. Model build failed: ${e.message}. Build embeddings manually.`;
  }
  document.getElementById('capSkipBtn').textContent='✔ Done — Close';
  // Refresh face lists if visible
  try{loadFacultyFace()}catch(e){}
  try{loadHODFace()}catch(e){}
}

function closeFaceCaptureModal(){
  capRunning=false;
  if(capStream){capStream.getTracks().forEach(t=>t.stop());capStream=null}
  document.getElementById('capVideo').srcObject=null;
  const c=document.getElementById('capCanvas');c.getContext('2d').clearRect(0,0,c.width,c.height);
  document.getElementById('faceCaptureModal').classList.remove('active');
}

    if(!r||!r.ok)return;
    const plans=await r.json();
    const el=document.getElementById('lpList');
    const canEdit=ROLE==='faculty'||ROLE==='hod'||ROLE==='admin';
    if(!plans.length){el.innerHTML='<p style="color:var(--text-muted);font-size:13px">No lesson plans yet. Generate one above!</p>';return}
    el.innerHTML=`<table class="data-table"><thead><tr>
      <th>Subject</th><th>Semester</th><th>Classes</th><th>Adjustments</th><th>Generated By</th><th></th>
    </tr></thead><tbody>${plans.map(p=>`<tr style="cursor:pointer" onclick="viewPlan(${p.id})">
      <td style="font-weight:700;color:var(--accent)">${p.subject}</td>
      <td>Sem ${p.semester}</td><td>${p.total_classes}</td>
      <td>${p.adjustments_count||0}</td>
      <td style="font-size:11px;color:var(--text-muted)">${p.generated_by}</td>
      <td>
        <button class="btn btn-primary" style="padding:3px 8px;font-size:11px" onclick="event.stopPropagation();viewPlan(${p.id})">📋 View</button>
        ${canEdit?`<button class="btn btn-danger" style="padding:3px 8px;font-size:11px;margin-left:4px" onclick="event.stopPropagation();deletePlan(${p.id})">🗑</button>`:''}
      </td>
    </tr>`).join('')}</tbody></table>`;
  }catch(e){console.error(e)}
}

async function generateLessonPlan(){
  const subj=document.getElementById('lpSubj').value;
  const sem=document.getElementById('lpSem').value;
  const cal=document.getElementById('lpCal').value;
  if(!subj){toast('Select a subject','error');return}
  if(!cal){toast('Select a calendar','error');return}
  // Auto-fill semester from syllabus option
  const opt=document.getElementById('lpSubj').selectedOptions[0];
  const actualSem=opt?.dataset?.sem||sem;
  const btn=document.getElementById('lpGenBtn');
  const status=document.getElementById('lpGenStatus');
  btn.disabled=true;btn.textContent='⏳ AI generating plan...';
  status.textContent='This takes 20-60 seconds. Please wait...';
  const fd=new FormData();fd.append('subject',subj);fd.append('semester',actualSem);fd.append('calendar_id',cal);
  try{
    const r=await fetch(API+'/planner/lesson-plan/generate',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN},body:fd});
    const d=await r.json();
    if(r.ok){toast(d.message);loadLessonPlans();viewPlan(d.plan_id)}
    else{toast(d.detail||'Generation failed','error')}
  }catch(e){toast('Error: '+e.message,'error')}
  finally{btn.disabled=false;btn.textContent='🤖 Generate Lesson Plan with AI';status.textContent=''}
}

async function viewPlan(planId){
  currentPlanId=planId;
  const card=document.getElementById('lpDetailCard');card.style.display='block';
  const canEdit=ROLE==='faculty'||ROLE==='hod'||ROLE==='admin';
  // Load progress
  try{
    const pr=await api(`/planner/lesson-plan/${planId}/progress`);
    if(pr&&pr.ok){
      const p=await pr.json();
      document.getElementById('lpDetailTitle').textContent=`📝 ${p.subject} — Lesson Plan`;
      const pct=p.progress_pct;
      const color=pct>=80?'var(--accent)':pct>=50?'var(--yellow)':'var(--red)';
      document.getElementById('lpProgressBar').innerHTML=`
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:200px;height:10px;background:var(--border);border-radius:5px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${color};border-radius:5px;transition:width .5s"></div>
          </div>
          <span style="font-size:13px;font-weight:700;color:${color}">${pct}%</span>
          <span style="font-size:11px;color:var(--text-muted)">${p.completed}/${p.total} done · ${p.missed} missed</span>
          ${p.needs_adjustment?'<span style="color:var(--red);font-size:11px;font-weight:600">⚠️ Behind schedule</span>':''}
        </div>`;
      // Action buttons
      document.getElementById('lpActions').innerHTML=canEdit?`
        <button class="btn btn-warning" onclick="autoSyncPlan(${planId})">🔄 Sync from Attendance</button>
        <button class="btn btn-primary" onclick="adjustPlan(${planId})">🤖 AI Auto-Adjust</button>
      `:'';
    }
  }catch(e){}
  // Load days
  try{
    const dr=await api(`/planner/lesson-plan/${planId}/days`);
    if(!dr||!dr.ok)return;
    const days=await dr.json();
    const el=document.getElementById('lpDays');
    const statusColors={completed:'var(--accent)',missed:'var(--red)',planned:'var(--blue)',rescheduled:'var(--yellow)'};
    const statusIcons={completed:'✅',missed:'❌',planned:'📅',rescheduled:'🔄'};
    let currentUnit='';
    let h='';
    days.forEach(d=>{
      if(d.unit!==currentUnit){
        currentUnit=d.unit;
        h+=`<div style="margin:16px 0 8px;font-weight:700;color:var(--purple);font-size:14px;border-bottom:1px solid var(--border);padding-bottom:4px">${d.unit}</div>`;
      }
      const sc=statusColors[d.status]||'var(--text-muted)';
      const si=statusIcons[d.status]||'📅';
      const dayName=new Date(d.day+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'});
      h+=`<div style="display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:4px;background:var(--bg-deep)">
        <div style="min-width:32px;text-align:center;font-size:13px">${si}</div>
        <div style="min-width:90px;font-size:12px;color:var(--text-muted)">${d.day}<br><span style="font-size:10px">${dayName}</span></div>
        <div style="min-width:28px;font-weight:700;color:var(--text-muted);font-size:12px">#${d.day_number}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px;color:var(--text-primary)">${d.topic}</div>
          ${d.subtopics?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${d.subtopics}</div>`:''}
        </div>
        <div style="min-width:80px;font-size:11px;color:var(--text-muted)">${d.teaching_method||''}</div>
        <div style="min-width:80px;font-size:11px;font-weight:600;color:${sc}">${d.status.toUpperCase()}</div>
        ${canEdit&&d.status==='planned'?`
        <div style="display:flex;gap:4px">
          <button class="btn btn-success" style="padding:2px 6px;font-size:10px" onclick="markDay(${d.id},'completed')">✅</button>
          <button class="btn btn-danger" style="padding:2px 6px;font-size:10px" onclick="markDay(${d.id},'missed')">❌</button>
        </div>`:''}
      </div>`;
    });
    el.innerHTML=h||'<p style="color:var(--text-muted)">No days in plan</p>';
  }catch(e){console.error(e)}
}

async function markDay(dayId,status){
  const fd=new FormData();fd.append('status',status);fd.append('actual_topic','');fd.append('remark','');
  const r=await fetch(API+`/planner/lesson-plan/day/${dayId}/status`,{method:'PUT',headers:{'Authorization':'Bearer '+TOKEN},body:fd});
  if(r.ok){toast(`Marked as ${status}`);if(currentPlanId)viewPlan(currentPlanId)}
  else{toast('Failed','error')}
}

async function autoSyncPlan(planId){
  toast('Syncing from attendance records...');
  const r=await api(`/planner/lesson-plan/${planId}/auto-sync`,{method:'POST'});
  if(r&&r.ok){const d=await r.json();toast(d.message);viewPlan(planId)}
  else{const d=await r?.json();toast(d?.detail||'Failed','error')}
}

async function adjustPlan(planId){
  if(!confirm('AI will reschedule remaining classes to cover missed topics. Continue?'))return;
  toast('AI is adjusting the plan... please wait 20-60 seconds');
  const r=await api(`/planner/lesson-plan/${planId}/adjust`,{method:'POST'});
  if(r&&r.ok){const d=await r.json();toast(d.message);viewPlan(planId)}
  else{const d=await r?.json();toast(d?.detail||'Adjustment failed','error')}
}

async function deletePlan(id){
  if(!confirm('Delete this lesson plan?'))return;
  const r=await api(`/planner/lesson-plan/${id}`,{method:'DELETE'});
  if(r&&r.ok){toast('Deleted');loadLessonPlans();document.getElementById('lpDetailCard').style.display='none'}
  else{toast('Failed','error')}
}
</script>
</body>
</html>
